<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMUK Field Staff Ledger — FY 2025-26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F2E9;
    --paper-2:#EFE9DA;
    --ink:#1C2A20;
    --ink-soft:#4B5A4F;
    --navy:#16241C;
    --navy-2:#223327;
    --gold:#B8892B;
    --gold-soft:#E9D8AE;
    --teal:#3E6E62;
    --teal-soft:#DCEAE5;
    --rust:#9C4A34;
    --rust-soft:#F1DCD3;
    --line:#D9D0BC;
    --shadow: 0 1px 2px rgba(28,42,32,0.06), 0 6px 20px rgba(28,42,32,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--gold-soft); }

  a{color:inherit;}

  /* ---------- Header ---------- */
  header.top{
    background:var(--navy);
    color:var(--paper);
    padding:28px 32px 26px;
    border-bottom:4px solid var(--gold);
  }
  .top-inner{
    max-width:1180px;
    margin:0 auto;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px 20px;
  }
  .brand-eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--gold-soft);
    margin:0 0 6px;
  }
  h1.brand{
    font-family:'Source Serif 4', serif;
    font-weight:700;
    font-size:30px;
    margin:0;
    letter-spacing:0.2px;
  }
  .fy-badge{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:var(--navy);
    background:var(--gold-soft);
    padding:6px 12px;
    border-radius:3px;
    white-space:nowrap;
  }

  /* ---------- Nav tabs ---------- */
  nav.tabs{
    background:var(--navy-2);
    border-bottom:1px solid #2c3f31;
  }
  .tabs-inner{
    max-width:1180px;
    margin:0 auto;
    padding:0 32px;
    display:flex;
    gap:2px;
  }
  .tab-btn{
    background:none;
    border:none;
    color:#B9C6BB;
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:13px 18px;
    cursor:pointer;
    border-bottom:3px solid transparent;
    transition:color .15s, border-color .15s;
  }
  .tab-btn:hover{ color:#fff; }
  .tab-btn.active{
    color:#fff;
    border-bottom-color:var(--gold);
  }

  /* ---------- Search ---------- */
  .search-wrap{
    max-width:1180px;
    margin:0 auto;
    padding:34px 32px 10px;
  }
  .search-box{
    position:relative;
    max-width:640px;
  }
  input#searchInput{
    width:100%;
    font-family:'Inter',sans-serif;
    font-size:16px;
    padding:15px 18px 15px 46px;
    border:1.5px solid var(--line);
    border-radius:6px;
    background:#fff;
    color:var(--ink);
    outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  input#searchInput:focus{
    border-color:var(--gold);
    box-shadow:0 0 0 3px var(--gold-soft);
  }
  .search-icon{
    position:absolute;
    left:16px; top:50%;
    transform:translateY(-50%);
    width:18px;height:18px;
    color:var(--ink-soft);
    pointer-events:none;
  }
  .search-hint{
    font-size:12.5px;
    color:var(--ink-soft);
    margin:9px 2px 0;
  }
  .search-hint kbd{
    font-family:'IBM Plex Mono',monospace;
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:3px;
    padding:1px 5px;
    font-size:11px;
  }

  /* ---------- Main layout ---------- */
  main{
    max-width:1180px;
    margin:0 auto;
    padding:18px 32px 80px;
  }

  .stats-row{
    display:flex;
    gap:28px;
    flex-wrap:wrap;
    margin:18px 2px 34px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .stats-row b{color:var(--ink); font-weight:600;}

  .section-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--teal);
    margin:0 0 14px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .section-label::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--line);
  }
  .count-chip{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
  }

  /* ---------- Branch chip results ---------- */
  .branch-chips{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:9px;
    margin-bottom:38px;
  }
  .branch-chip{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    background:var(--teal-soft);
    color:var(--navy-2);
    border:1px solid #bcd6cd;
    padding:9px 14px;
    border-radius:10px;
    cursor:pointer;
    transition:transform .1s, box-shadow .1s;
    display:flex;
    flex-direction:column;
    gap:2px;
    align-items:flex-start;
  }
  .branch-chip .chip-top{
    display:flex;
    align-items:center;
    gap:8px;
    width:100%;
  }
  .branch-chip .chip-name{ font-weight:600; }
  .branch-chip .chip-sub{
    font-family:'Inter',sans-serif;
    font-size:11px;
    color:#4d6a60;
    font-weight:400;
  }
  .branch-chip:hover{
    box-shadow:var(--shadow);
    transform:translateY(-1px);
  }
  .branch-chip .n{ color:var(--teal); font-weight:600; margin-left:6px;}

  /* ---------- Employee cards ---------- */
  .card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
    gap:14px;
  }
  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    padding:16px 17px 14px;
    cursor:pointer;
    transition:transform .12s, box-shadow .12s, border-color .12s;
    position:relative;
  }
  .card:hover{
    box-shadow:var(--shadow);
    transform:translateY(-2px);
    border-color:#c9bd9c;
  }
  .card .pin{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:0.02em;
  }
  .card .name{
    font-family:'Source Serif 4',serif;
    font-weight:600;
    font-size:17px;
    margin:4px 0 8px;
    line-height:1.25;
  }
  .card .role{
    font-size:13px;
    color:var(--ink);
    margin-bottom:3px;
    font-weight:500;
  }
  .card .loc{
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .card .badge{
    position:absolute;
    top:14px; right:14px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    padding:3px 7px;
    border-radius:10px;
    letter-spacing:0.02em;
  }
  .badge.changed{ background:var(--gold-soft); color:#7a5a17; }
  .badge.nochange{ background:var(--paper-2); color:var(--ink-soft); }

  .empty-state{
    padding:60px 20px;
    text-align:center;
    color:var(--ink-soft);
  }
  .empty-state .big{
    font-family:'Source Serif 4',serif;
    font-size:22px;
    color:var(--ink);
    margin-bottom:8px;
  }

  /* ---------- Detail view (profile / branch) ---------- */
  #detailView{ display:none; }
  .back-btn{
    display:inline-flex;
    align-items:center;
    gap:7px;
    background:none;
    border:1px solid var(--line);
    color:var(--ink);
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    padding:8px 14px;
    border-radius:5px;
    cursor:pointer;
    margin-bottom:26px;
  }
  .back-btn:hover{ background:var(--paper-2); }

  .profile-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    flex-wrap:wrap;
    gap:16px;
    padding-bottom:22px;
    border-bottom:2px solid var(--navy);
    margin-bottom:26px;
  }
  .profile-header h2{
    font-family:'Source Serif 4',serif;
    font-size:28px;
    margin:0 0 6px;
  }
  .profile-header .pin{
    font-family:'IBM Plex Mono',monospace;
    color:var(--ink-soft);
    font-size:13px;
  }
  .profile-current{
    text-align:right;
  }
  .profile-current .label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--teal);
    margin-bottom:4px;
  }
  .profile-current .role{
    font-weight:600;
    font-size:15px;
  }
  .profile-current .loc{
    color:var(--ink-soft);
    font-size:13.5px;
  }

  .summary-box{
    background:#fff;
    border:1px solid var(--line);
    border-left:4px solid var(--gold);
    border-radius:0 6px 6px 0;
    padding:14px 18px;
    margin-bottom:32px;
    font-size:13.5px;
    line-height:1.7;
    white-space:pre-line;
  }
  .summary-box.nochange{ border-left-color: var(--ink-soft); color:var(--ink-soft); font-style:italic; }

  /* Timeline */
  .timeline{
    position:relative;
    padding-left:28px;
  }
  .timeline::before{
    content:'';
    position:absolute;
    left:6px; top:6px; bottom:6px;
    width:2px;
    background:var(--line);
  }
  .t-row{
    position:relative;
    padding-bottom:22px;
  }
  .t-row::before{
    content:'';
    position:absolute;
    left:-28px; top:4px;
    width:11px; height:11px;
    border-radius:50%;
    background:#fff;
    border:2.5px solid var(--ink-soft);
  }
  .t-row.has-change::before{ border-color:var(--gold); background:var(--gold); }
  .t-row.absent::before{ border-color:var(--line); background:var(--line); }
  .t-month{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:4px;
  }
  .t-role{ font-weight:600; font-size:14.5px; }
  .t-loc{ font-size:13px; color:var(--ink-soft); margin-top:1px;}
  .t-absent-text{ font-size:13px; color:var(--ink-soft); font-style:italic; }
  .tag-row{ margin-top:6px; display:flex; gap:6px; flex-wrap:wrap; }
  .tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    padding:2px 8px;
    border-radius:9px;
  }
  .tag.promo{ background:var(--gold-soft); color:#7a5a17;}
  .tag.transfer{ background:var(--teal-soft); color:#204238;}

  /* Branch view */
  .branch-header{
    padding-bottom:20px;
    border-bottom:2px solid var(--navy);
    margin-bottom:26px;
  }
  .branch-header .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--teal);
    margin-bottom:6px;
  }
  .branch-header h2{
    font-family:'Source Serif 4',serif;
    font-size:27px;
    margin:0;
  }
  .branch-header .loc-sub{
    font-size:13.5px;
    color:var(--ink-soft);
    margin-top:6px;
    font-family:'IBM Plex Mono',monospace;
  }
  .month-block{
    margin-bottom:26px;
  }
  .month-block .m-head{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--navy-2);
    background:var(--paper-2);
    display:inline-block;
    padding:5px 12px;
    border-radius:4px;
    margin-bottom:10px;
  }
  .roster{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:8px;
  }
  .roster-item{
    background:#fff;
    border:1px solid var(--line);
    border-radius:6px;
    padding:10px 13px;
    font-size:13px;
  }
  .roster-item .rn{ font-weight:600; }
  .roster-item .rp{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft); }
  .roster-item .rd{ color:var(--ink-soft); font-size:12.5px; margin-top:2px;}
  .roster-item.new{ border-left:3px solid var(--teal); }
  .roster-item.left{ border-left:3px solid var(--rust); opacity:0.75; }
  .roster-empty{ font-size:12.5px; color:var(--ink-soft); font-style:italic; }

  @media (max-width:640px){
    header.top{padding:22px 18px;}
    h1.brand{font-size:23px;}
    .search-wrap{padding:24px 18px 6px;}
    main{padding:14px 18px 60px;}
    .profile-header{flex-direction:column;}
    .profile-current{text-align:left;}
    .tabs-inner{padding:0 18px; overflow-x:auto;}
  }

  /* ---------- Transfers page ---------- */
  .page-header{
    padding-bottom:18px;
    margin-bottom:24px;
    border-bottom:2px solid var(--navy);
  }
  .page-header h2{
    font-family:'Source Serif 4',serif;
    font-size:26px;
    margin:0 0 4px;
  }
  .page-header .sub{
    font-size:13px;
    color:var(--ink-soft);
  }
  .month-tabs{
    display:flex;
    flex-wrap:wrap;
    gap:7px;
    margin-bottom:28px;
  }
  .month-tab{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    background:#fff;
    border:1px solid var(--line);
    color:var(--ink);
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
  }
  .month-tab:hover{ border-color:var(--gold); }
  .month-tab.active{
    background:var(--navy);
    color:#fff;
    border-color:var(--navy);
  }
  .transfer-count{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    color:var(--ink-soft);
    margin-bottom:16px;
  }
  .transfer-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .transfer-item{
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    padding:14px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
    cursor:pointer;
  }
  .transfer-item:hover{ box-shadow:var(--shadow); border-color:#c9bd9c; }
  .transfer-who .name{ font-weight:600; font-size:14.5px; }
  .transfer-who .pin{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); }
  .transfer-who .role{ font-size:12.5px; color:var(--ink-soft); margin-top:2px; }
  .transfer-route{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    text-align:right;
  }
  .transfer-route .loc-from{ color:var(--ink-soft); }
  .transfer-route .arrow{ color:var(--gold); font-weight:600; }
  .transfer-route .loc-to{ font-weight:600; }
  .transfer-item .also-promo{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    background:var(--gold-soft);
    color:#7a5a17;
    padding:2px 7px;
    border-radius:9px;
    white-space:nowrap;
  }

  /* ---------- Structure map ---------- */
  .struct-tree{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .region-block{
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    overflow:hidden;
  }
  .region-head{
    font-family:'Source Serif 4',serif;
    font-weight:600;
    font-size:16.5px;
    background:var(--navy);
    color:#fff;
    padding:12px 18px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .region-head .n{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--gold-soft);
    font-weight:400;
  }
  .region-body{
    padding:14px 18px 18px;
    display:none;
  }
  .region-body.open{ display:block; }
  .area-block{ margin-bottom:14px; }
  .area-block:last-child{ margin-bottom:0; }
  .area-name{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--teal);
    margin-bottom:8px;
  }
  .branch-pills{
    display:flex;
    flex-wrap:wrap;
    gap:7px;
  }
  .branch-pill{
    font-size:12.5px;
    background:var(--paper-2);
    border:1px solid var(--line);
    padding:6px 12px;
    border-radius:16px;
    cursor:pointer;
  }
  .branch-pill:hover{ background:var(--teal-soft); border-color:#bcd6cd; }
  .branch-pill.none{
    font-style:italic;
    color:var(--ink-soft);
    cursor:default;
  }
  .branch-pill.none:hover{ background:var(--paper-2); border-color:var(--line); }

</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div>
      <p class="brand-eyebrow">Padakhep Manabik Unnayan Kendra · Human Resource &amp; Admin Division</p>
      <h1 class="brand">Field Staff Ledger</h1>
    </div>
    <div class="fy-badge">FY 2025–26 · Jul 25 – Jun 26</div>
  </div>
</header>

<nav class="tabs">
  <div class="tabs-inner">
    <button class="tab-btn active" data-tab="search">Search</button>
    <button class="tab-btn" data-tab="transfers">Transfers</button>
    <button class="tab-btn" data-tab="structure">Structure Map</button>
  </div>
</nav>

<div class="search-wrap" id="searchWrap">
  <div class="search-box">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" type="text" placeholder="Search by name, PIN, or branch / area / zone…" autocomplete="off">
  </div>
  <p class="search-hint">Try a name (<kbd>Paritosh Das</kbd>), a PIN (<kbd>0043000208</kbd>), or a location (<kbd>Nabinagar</kbd>). Results update as you type.</p>
</div>

<main>
  <div id="searchView">
    <div class="stats-row" id="statsRow"></div>
    <div id="resultsArea"></div>
  </div>

  <div id="transfersView" style="display:none"></div>
  <div id="structureView" style="display:none"></div>
  <div id="detailView"></div>
</main>


<script>
let DATA, MONTHS, DESIGS, LOCS, EMPLOYEES;

fetch('data.json')
  .then(r => {
    if(!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(json => {
    DATA = json;
    MONTHS = DATA.months;
    DESIGS = DATA.designations;
    LOCS = DATA.locations;
    EMPLOYEES = DATA.employees;
    initApp();
  })
  .catch(err => {
    document.getElementById('resultsArea').innerHTML =
      `<div class="empty-state"><div class="big">Could not load data.json</div>Make sure data.json is in the same folder as this page and you're viewing it over http(s), not a local file:// path.<br><br><span style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;">${err.message}</span></div>`;
  });

// Build branch -> employees-by-month index lazily on demand
function initApp(){

function monthRecord(emp, idx){
  const m = emp.months[idx];
  if(!m) return null;
  return { designation: DESIGS[m[0]], location: m[1] !== null && m[1] !== undefined ? LOCS[m[1]] : null };
}

function currentRecord(emp){
  for(let i = emp.months.length - 1; i >= 0; i--){
    if(emp.months[i]) return { idx:i, rec: monthRecord(emp, i) };
  }
  return null;
}

const searchInput = document.getElementById('searchInput');
const resultsArea = document.getElementById('resultsArea');
const statsRow = document.getElementById('statsRow');
const searchView = document.getElementById('searchView');
const detailView = document.getElementById('detailView');
const transfersView = document.getElementById('transfersView');
const structureView = document.getElementById('structureView');
const searchWrap = document.getElementById('searchWrap');

let currentTab = 'search';

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  searchView.style.display = tab === 'search' ? 'block' : 'none';
  transfersView.style.display = tab === 'transfers' ? 'block' : 'none';
  structureView.style.display = tab === 'structure' ? 'block' : 'none';
  searchWrap.style.display = tab === 'search' ? 'block' : 'none';
  detailView.style.display = 'none';
  if(tab === 'transfers' && !transfersView.dataset.built) renderTransfersPage();
  if(tab === 'structure' && !structureView.dataset.built) renderStructurePage();
  window.scrollTo(0,0);
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});


function escapeHtml(s){
  if(s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderStats(){
  statsRow.innerHTML = `
    <span><b>${EMPLOYEES.length.toLocaleString()}</b> individuals on record</span>
    <span><b>${LOCS.length.toLocaleString()}</b> branches / areas / zones</span>
    <span><b>${MONTHS[0]} – ${MONTHS[MONTHS.length-1]}</b> coverage, Jun 26 pending</span>
  `;
}

function employeeCard(emp){
  const cur = currentRecord(emp);
  const role = cur ? cur.rec.designation : '—';
  const loc = cur ? cur.rec.location : '—';
  const changed = emp.events.length > 0;
  return `<div class="card" data-pin="${emp.pin}">
    <span class="badge ${changed ? 'changed' : 'nochange'}">${changed ? emp.events.length + (emp.events.length>1?' changes':' change') : 'no change'}</span>
    <div class="pin">${emp.pin}</div>
    <div class="name">${escapeHtml(emp.name)}</div>
    <div class="role">${escapeHtml(role)}</div>
    <div class="loc">${escapeHtml(loc || '')}</div>
  </div>`;
}

function locInfoText(locName){
  const info = DATA.location_info ? DATA.location_info[locName] : null;
  if(!info) return '';
  if(info.type === 'branch') return `${info.area} · ${info.region}`;
  if(info.type === 'area') return info.region;
  return '';
}

function branchChip(locName, count){
  const sub = locInfoText(locName);
  return `<div class="branch-chip" data-branch="${escapeHtml(locName)}">
    <div class="chip-top"><span class="chip-name">${escapeHtml(locName)}</span><span class="n">${count}</span></div>
    ${sub ? `<span class="chip-sub">${escapeHtml(sub)}</span>` : ''}
  </div>`;
}

function runSearch(query){
  const q = query.trim().toLowerCase();
  if(!q){
    resultsArea.innerHTML = `<div class="empty-state"><div class="big">Search the ledger</div>Start typing a name, PIN, or branch above.</div>`;
    return;
  }

  const matchedLocs = LOCS.filter(l => l.toLowerCase().includes(q));
  const matchedEmployees = EMPLOYEES.filter(e =>
    (e.name && e.name.toLowerCase().includes(q)) || e.pin.includes(q)
  );

  let html = '';

  if(matchedLocs.length){
    // count current headcount per matched location for display
    const counts = matchedLocs.map(loc => {
      let c = 0;
      for(const e of EMPLOYEES){
        const cur = currentRecord(e);
        if(cur && cur.rec.location === loc) c++;
      }
      return [loc, c];
    });
    html += `<p class="section-label">Branches / Areas / Zones <span class="count-chip">${matchedLocs.length} match${matchedLocs.length>1?'es':''}</span></p>`;
    html += `<div class="branch-chips">${counts.map(([l,c]) => branchChip(l,c)).join('')}</div>`;
  }

  if(matchedEmployees.length){
    html += `<p class="section-label">People <span class="count-chip">${matchedEmployees.length} match${matchedEmployees.length>1?'es':''}</span></p>`;
    const shown = matchedEmployees.slice(0, 60);
    html += `<div class="card-grid">${shown.map(employeeCard).join('')}</div>`;
    if(matchedEmployees.length > 60){
      html += `<p style="margin-top:14px;color:var(--ink-soft);font-size:12.5px;font-family:'IBM Plex Mono',monospace;">Showing first 60 of ${matchedEmployees.length} — refine your search to narrow further.</p>`;
    }
  }

  if(!matchedLocs.length && !matchedEmployees.length){
    html = `<div class="empty-state"><div class="big">No matches</div>Nothing in the ledger matches "${escapeHtml(query)}".</div>`;
  }

  resultsArea.innerHTML = html;

  resultsArea.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => showProfile(el.dataset.pin));
  });
  resultsArea.querySelectorAll('.branch-chip').forEach(el => {
    el.addEventListener('click', () => showBranch(el.dataset.branch));
  });
}

function showProfile(pin){
  const emp = EMPLOYEES.find(e => e.pin === pin);
  if(!emp) return;
  const cur = currentRecord(emp);
  const eventMonths = {};
  emp.events.forEach(ev => { eventMonths[ev.m] = ev; });

  let timelineHtml = '';
  MONTHS.forEach((m, idx) => {
    const rec = monthRecord(emp, idx);
    const ev = eventMonths[m];
    const hasChange = !!ev;
    if(!rec){
      timelineHtml += `<div class="t-row absent">
        <div class="t-month">${m}</div>
        <div class="t-absent-text">Not on record this month</div>
      </div>`;
      return;
    }
    let tags = '';
    if(ev){
      if(ev.p) tags += `<span class="tag promo">Promoted</span>`;
      if(ev.t) tags += `<span class="tag transfer">Transferred</span>`;
    }
    timelineHtml += `<div class="t-row ${hasChange ? 'has-change' : ''}">
      <div class="t-month">${m}</div>
      <div class="t-role">${escapeHtml(rec.designation)}</div>
      <div class="t-loc">${escapeHtml(rec.location || '')}</div>
      ${tags ? `<div class="tag-row">${tags}</div>` : ''}
    </div>`;
  });

  const summaryClass = emp.summary === 'No change' ? 'summary-box nochange' : 'summary-box';

  detailView.innerHTML = `
    <button class="back-btn" id="backBtn">&larr; ${backLabel()}</button>
    <div class="profile-header">
      <div>
        <h2>${escapeHtml(emp.name)}</h2>
        <div class="pin">PIN ${emp.pin}</div>
      </div>
      <div class="profile-current">
        <div class="label">Latest on record</div>
        <div class="role">${cur ? escapeHtml(cur.rec.designation) : '—'}</div>
        <div class="loc">${cur ? escapeHtml(cur.rec.location || '') : ''}</div>
      </div>
    </div>
    <div class="${summaryClass}">${escapeHtml(emp.summary)}</div>
    <div class="timeline">${timelineHtml}</div>
  `;
  document.getElementById('backBtn').addEventListener('click', backToSearch);
  openDetail();
}

function showBranch(locName){
  // Build month-by-month roster for this exact location string
  const monthRosters = MONTHS.map(() => []);
  EMPLOYEES.forEach(emp => {
    MONTHS.forEach((m, idx) => {
      const rec = monthRecord(emp, idx);
      if(rec && rec.location === locName){
        monthRosters[idx].push({ name: emp.name, pin: emp.pin, designation: rec.designation });
      }
    });
  });

  let blocksHtml = '';
  MONTHS.forEach((m, idx) => {
    const roster = monthRosters[idx];
    const prevSet = idx > 0 ? new Set(monthRosters[idx-1].map(p => p.pin)) : new Set();
    const curSet = new Set(roster.map(p => p.pin));
    let items = '';
    if(roster.length === 0){
      items = `<div class="roster-empty">No staff recorded at this location for ${m}.</div>`;
    } else {
      items = `<div class="roster">` + roster.map(p => {
        const isNew = idx > 0 && !prevSet.has(p.pin);
        return `<div class="roster-item ${isNew ? 'new' : ''}">
          <div class="rn">${escapeHtml(p.name)}</div>
          <div class="rp">${p.pin}</div>
          <div class="rd">${escapeHtml(p.designation)}</div>
        </div>`;
      }).join('') + `</div>`;
    }
    blocksHtml += `<div class="month-block">
      <div class="m-head">${m}${idx>0 ? ` · ${roster.length} on roster` : ` · ${roster.length} on roster`}</div>
      ${items}
    </div>`;
  });

  const locSub = locInfoText(locName);

  detailView.innerHTML = `
    <button class="back-btn" id="backBtn">&larr; ${backLabel()}</button>
    <div class="branch-header">
      <div class="eyebrow">Location history</div>
      <h2>${escapeHtml(locName)}</h2>
      ${locSub ? `<div class="loc-sub">${escapeHtml(locSub)}</div>` : ''}
    </div>
    ${blocksHtml}
  `;
  document.getElementById('backBtn').addEventListener('click', backToSearch);
  openDetail();
}

function backLabel(){
  if(currentTab === 'transfers') return 'Back to transfers';
  if(currentTab === 'structure') return 'Back to structure map';
  return 'Back to search';
}

function openDetail(){
  searchWrap.style.display = 'none';
  searchView.style.display = 'none';
  transfersView.style.display = 'none';
  structureView.style.display = 'none';
  detailView.style.display = 'block';
  window.scrollTo(0,0);
}

function backToSearch(){
  detailView.style.display = 'none';
  searchWrap.style.display = currentTab === 'search' ? 'block' : 'none';
  searchView.style.display = currentTab === 'search' ? 'block' : 'none';
  transfersView.style.display = currentTab === 'transfers' ? 'block' : 'none';
  structureView.style.display = currentTab === 'structure' ? 'block' : 'none';
  window.scrollTo(0,0);
}

// ---------- Transfers page ----------
function buildTransfersByMonth(){
  const byMonth = {};
  MONTHS.forEach(m => byMonth[m] = []);
  EMPLOYEES.forEach(emp => {
    emp.events.forEach(ev => {
      if(ev.t){ // transferred
        byMonth[ev.m].push({
          name: emp.name, pin: emp.pin,
          fromLoc: ev.fl, toLoc: ev.tl,
          promoted: ev.p, fromDesig: ev.fd, toDesig: ev.td,
        });
      }
    });
  });
  return byMonth;
}

let TRANSFERS_BY_MONTH = null;
let activeTransferMonth = null;

function renderTransfersPage(){
  transfersView.dataset.built = '1';
  if(!TRANSFERS_BY_MONTH) TRANSFERS_BY_MONTH = buildTransfersByMonth();
  activeTransferMonth = MONTHS[MONTHS.length - 1];

  const monthTabsHtml = MONTHS.map(m =>
    `<button class="month-tab ${m === activeTransferMonth ? 'active' : ''}" data-month="${m}">${m} <span style="opacity:.6">(${TRANSFERS_BY_MONTH[m].length})</span></button>`
  ).join('');

  transfersView.innerHTML = `
    <div class="page-header">
      <h2>Transfers</h2>
      <div class="sub">Every branch/area/zone move recorded month over month. Select a month to see who moved.</div>
    </div>
    <div class="month-tabs">${monthTabsHtml}</div>
    <div id="transferListWrap"></div>
  `;

  transfersView.querySelectorAll('.month-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTransferMonth = btn.dataset.month;
      transfersView.querySelectorAll('.month-tab').forEach(b => b.classList.toggle('active', b === btn));
      renderTransferList();
    });
  });

  renderTransferList();
}

function renderTransferList(){
  const wrap = document.getElementById('transferListWrap');
  const list = TRANSFERS_BY_MONTH[activeTransferMonth];
  if(list.length === 0){
    wrap.innerHTML = `<div class="empty-state"><div class="big">No transfers recorded</div>No branch/area/zone moves logged for ${activeTransferMonth}.</div>`;
    return;
  }
  wrap.innerHTML = `
    <div class="transfer-count">${list.length} transfer${list.length>1?'s':''} in ${activeTransferMonth}</div>
    <div class="transfer-list">
      ${list.map(t => `
        <div class="transfer-item" data-pin="${t.pin}">
          <div class="transfer-who">
            <div class="name">${escapeHtml(t.name)} ${t.promoted ? '<span class="also-promo">Also promoted</span>' : ''}</div>
            <div class="pin">${t.pin}</div>
            <div class="role">${escapeHtml(t.promoted ? (t.fromDesig + ' \u2192 ' + t.toDesig) : t.toDesig)}</div>
          </div>
          <div class="transfer-route">
            <span class="loc-from">${escapeHtml(t.fromLoc)}</span>
            <span class="arrow">&rarr;</span>
            <span class="loc-to">${escapeHtml(t.toLoc)}</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  wrap.querySelectorAll('.transfer-item').forEach(el => {
    el.addEventListener('click', () => showProfile(el.dataset.pin));
  });
}

// ---------- Structure map page ----------
function currentHeadcount(locName){
  let c = 0;
  for(const e of EMPLOYEES){
    const cur = currentRecord(e);
    if(cur && cur.rec.location === locName) c++;
  }
  return c;
}

function renderStructurePage(){
  structureView.dataset.built = '1';
  const hierarchy = DATA.hierarchy || {};
  const asOf = DATA.hierarchy_asof || MONTHS[MONTHS.length - 1];
  const regions = Object.keys(hierarchy).sort();

  const blocksHtml = regions.map((region, ri) => {
    const areas = hierarchy[region];
    const areaNames = Object.keys(areas).sort();
    const branchCount = areaNames.reduce((s,a) => s + areas[a].length, 0);
    const areasHtml = areaNames.map(area => {
      const branches = areas[area];
      const pillsHtml = branches.length
        ? branches.map(b => `<span class="branch-pill" data-branch="${escapeHtml(b)}">${escapeHtml(b)}</span>`).join('')
        : `<span class="branch-pill none">No branch-level staff (area-level positions only)</span>`;
      return `<div class="area-block">
        <div class="area-name">${escapeHtml(area)} <span style="opacity:.6">(${branches.length} branch${branches.length!==1?'es':''})</span></div>
        <div class="branch-pills">${pillsHtml}</div>
      </div>`;
    }).join('');
    return `<div class="region-block">
      <div class="region-head" data-idx="${ri}">
        <span>${escapeHtml(region)}</span>
        <span class="n">${areaNames.length} areas · ${branchCount} branches</span>
      </div>
      <div class="region-body" id="region-body-${ri}">${areasHtml}</div>
    </div>`;
  }).join('');

  structureView.innerHTML = `
    <div class="page-header">
      <h2>Structure Map</h2>
      <div class="sub">Organizational hierarchy as of ${asOf}: which branch sits under which area, and which area under which region. Click a region to expand, click a branch to see its posting history.</div>
    </div>
    <div class="struct-tree">${blocksHtml}</div>
  `;

  structureView.querySelectorAll('.region-head').forEach(el => {
    el.addEventListener('click', () => {
      const body = document.getElementById('region-body-' + el.dataset.idx);
      body.classList.toggle('open');
    });
  });
  structureView.querySelectorAll('.branch-pill:not(.none)').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      showBranch(el.dataset.branch);
    });
  });
}

searchInput.addEventListener('input', e => runSearch(e.target.value));
renderStats();
runSearch('');

} // end initApp
</script>
</body>
</html>
